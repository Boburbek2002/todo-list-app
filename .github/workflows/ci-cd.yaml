name: GitOps CI/CD
 
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
 
env:
  CONTAINER_NAME: devops-journey
  CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
  CI_REGISTRY_USER: ${{ secrets.CI_REGISTRY_USER }}
  CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
  REPO_NAME: to-do
  IMAGE_NAME: to-do-list-app
  GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
  MANIFEST_REPO_URL: ${{ secrets.MANIFEST_REPO_URL }}
  MANIFEST_PATH: ${{ secrets.MANIFEST_PATH }}
 
jobs:
  build_and_push:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
 
      - name: Login to Registry
        run: echo "${{ env.CI_REGISTRY_PASSWORD }}" | docker login -u "${{ env.CI_REGISTRY_USER }}" --password-stdin ${{ env.CI_REGISTRY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: "${{ env.CI_REGISTRY }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

    update-manifest:
      runs-on: ubuntu-latest
      needs: ['build_and_push']
      steps:
        - name: Update manifest repository
          uses: actions/checkout@v2
          with:
            repository: ${{ env.MANIFEST_REPO_URL }}
            path: manifests
            token: ${{ secrets.PERSONAL_TOKEN }}
            ref: main  
  
        - name: Update deployment.yaml in manifest repository
          run: |
            cd manifests
            echo "${{ env.CI_REGISTRY }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            new_image="${{ env.CI_REGISTRY }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          
            sed -i "s|image: .*|image: $new_image|g" ${{ env.MANIFEST_PATH }}/deployment.yaml      
            git config --global user.email "${{ secrets.GIT_EMAIL }}"
            git config --global user.name "${{ secrets.GIT_USERNAME }}"
            git add ${{ env.MANIFEST_PATH }}/deployment.yaml
            git diff --cached --exit-code || git commit -m "Update image tag to $new_image" && git push origin main
