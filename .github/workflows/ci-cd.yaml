name: GitOps CI/CD
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
 
env:
  CONTAINER_NAME: devops-journey
  CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
  CI_REGISTRY_USER: ${{ secrets.CI_REGISTRY_USER }}
  CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
  IMAGE_NAME: to-do-list-app
  GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
 
jobs:
  build_and_push:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
 
      - name: Login to Registry
        run: echo "${{ env.CI_REGISTRY_PASSWORD }}" | docker login -u "${{ env.CI_REGISTRY_USER }}" --password-stdin ${{ env.CI_REGISTRY }}

      - name: Build image
        run: docker build -t ${{ env.CI_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ env.CI_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

